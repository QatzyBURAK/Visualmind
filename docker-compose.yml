version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: visualmind_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: visualmind_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DB:-visualmind}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: visualmind_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  backend:
    build: .
    container_name: visualmind_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      MYSQL_HOST: mysql
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama_data:
  mysql_data:
  chroma_data:
