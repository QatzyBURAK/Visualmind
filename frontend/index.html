<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VisualMind — AI Document Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --accent: #7c3aed;
        --accent-dark: #6d28d9;
        --accent-light: #a78bfa;
        --accent-bg: rgba(124,58,237,0.15);
        --accent-border: rgba(124,58,237,0.2);
        --accent-shadow: rgba(124,58,237,0.3);
        --accent-shadow-sm: rgba(124,58,237,0.1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0a0a0f;
        color: #f1f5f9;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        height: 100vh;
        overflow: hidden;
      }

      #root { height: 100vh; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

      @keyframes bounce {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-4px); }
      }

      @keyframes glow {
        0%,100% { box-shadow: 0 0 8px var(--accent-shadow); }
        50%     { box-shadow: 0 0 20px var(--accent-shadow); }
      }

      @keyframes progressPulse {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }

      @keyframes dotBounce {
        0%, 80%, 100% { transform: translateY(0); }
        40%           { transform: translateY(-5px); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Utility classes */
      .fade-up { animation: fadeUp 0.3s ease forwards; }

      .shimmer-bg {
        background: linear-gradient(90deg, #1a1a24 25%, #22222f 50%, #1a1a24 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      .msg-enter { animation: fadeIn 0.2s ease forwards; }

      .skeleton {
        background: linear-gradient(90deg, #1a1a24 25%, #22222f 50%, #1a1a24 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }

      .typing-dot {
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #475569;
        margin: 0 2px;
        animation: dotBounce 1.2s infinite ease-in-out;
      }
      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      .progress-bar {
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(
          90deg,
          #1a1a24 0%,
          var(--accent) 30%,
          var(--accent-light) 50%,
          var(--accent) 70%,
          #1a1a24 100%
        );
        background-size: 200% auto;
        animation: progressPulse 1.8s linear infinite;
      }

      .pulse-dot { animation: pulse 2s infinite; }

      @keyframes modalSlide {
        from { opacity: 0; transform: translateY(-12px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Markdown body styles */
      .markdown-body { color: #e2e8f0; line-height: 1.7; }
      .markdown-body p { margin: 0 0 10px; }
      .markdown-body p:last-child { margin-bottom: 0; }
      .markdown-body strong { color: #f1f5f9; font-weight: 600; }
      .markdown-body em { color: #c4b5fd; }
      .markdown-body code {
        background: var(--accent-bg);
        border: 1px solid var(--accent-border);
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 12px;
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        color: var(--accent-light);
      }
      .markdown-body pre {
        background: #0d0d14;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px;
        padding: 14px 16px;
        overflow-x: auto;
        margin: 10px 0;
      }
      .markdown-body pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 13px;
        color: #e2e8f0;
      }
      .markdown-body ul, .markdown-body ol { padding-left: 20px; margin: 8px 0; }
      .markdown-body li { margin: 4px 0; }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        color: #f1f5f9;
        font-weight: 600;
        margin: 14px 0 8px;
        line-height: 1.3;
      }
      .markdown-body h1 { font-size: 16px; }
      .markdown-body h2 { font-size: 15px; }
      .markdown-body h3 { font-size: 14px; }
      .markdown-body blockquote {
        border-left: 3px solid var(--accent-border);
        padding-left: 12px;
        color: #94a3b8;
        margin: 8px 0;
        font-style: italic;
      }
      .markdown-body table {
        border-collapse: collapse;
        width: 100%;
        margin: 10px 0;
        font-size: 12px;
      }
      .markdown-body th {
        background: var(--accent-bg);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 8px 12px;
        color: #f1f5f9;
        font-weight: 600;
        text-align: left;
      }
      .markdown-body td {
        border: 1px solid rgba(255,255,255,0.06);
        padding: 7px 12px;
        color: #e2e8f0;
      }
      .markdown-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
      .markdown-body hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 14px 0; }
      .markdown-body a { color: var(--accent-light); text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
